# Tech Temple — Cloudflare Pages Configuration
# For Cloudflare Pages (recommended for Next.js)
# This config is optional — Pages auto-detects Next.js

name = "tech-temple"

# Pages automatically handles Node.js build output
# No need to specify build command for Pages — it auto-detects

[env.production]
# Your custom domain
route = "tech-temple.com/*"
zone_id = ""  # Set this if using custom domain
