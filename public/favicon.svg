<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="64" height="64" fill="#0a0a0b"/>

  <!-- Torii gate in flame orange -->
  <g fill="#e85e2c">
    <!-- Top curved beam -->
    <path d="M 12 22 Q 32 16 52 22 L 50 26 Q 32 20 14 26 Z"/>

    <!-- Horizontal crossbeam -->
    <rect x="14" y="28" width="36" height="3" rx="1"/>

    <!-- Left pillar -->
    <rect x="20" y="28" width="4" height="26" rx="1"/>

    <!-- Right pillar -->
    <rect x="40" y="28" width="4" height="26" rx="1"/>

    <!-- Base platform left -->
    <rect x="18" y="54" width="8" height="3" rx="1"/>

    <!-- Base platform right -->
    <rect x="38" y="54" width="8" height="3" rx="1"/>
  </g>

  <!-- Flame core glow -->
  <circle cx="32" cy="35" r="8" fill="#ff8a5a" opacity="0.6"/>
  <circle cx="32" cy="35" r="5" fill="#ff8a5a" opacity="0.3"/>
</svg>
